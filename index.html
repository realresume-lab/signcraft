    }

    function Editor({ onBack }) {
      const [data, setData] = useState(DEFAULT_DATA);
      const [tmpl, setTmpl] = useState("modern");
      const [cs, setCs] = useState("navy");
      const [font, setFont] = useState("arial");
      const [copied, setCopied] = useState(false);
      const [tab, setTab] = useState("details");

      const update = (k, v) => setData(p => ({...p, [k]: v}));
      const updateSocial = (pid, v) => setData(p => ({...p, socials: {...p.socials, [pid]: v}}));

      const handleCopy = () => {
        const html = genSigHTML(data, tmpl, cs, font, false);
        try {
          const blob = new Blob([html], {type:"text/html"});
          const plain = new Blob([html], {type:"text/plain"});
          navigator.clipboard.write([new ClipboardItem({"text/html":blob,"text/plain":plain})]).then(() => {
            setCopied(true); setTimeout(() => setCopied(false), 2500);
          });
        } catch(e) {
          const ta = document.createElement("textarea"); ta.value = html;
          document.body.appendChild(ta); ta.select(); document.execCommand("copy");
          document.body.removeChild(ta);
          setCopied(true); setTimeout(() => setCopied(false), 2500);
        }
      };

      const sigHTML = genSigHTML(data, tmpl, cs, font, false);
      const iS = {width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #2d3748",background:"#0f1629",color:"#e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
      const lS = {fontSize:11,fontWeight:600,color:"#94a3b8",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:0.5};

      return (
        <div style={{minHeight:"100vh",background:"#0a0e1a",color:"#e2e8f0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 24px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexWrap:"wrap",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={onBack} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:14,padding:"4px 8px"}}>{"\u2190"} Back</button>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#c6941a)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"#fff"}}>S</div>
                <span style={{fontWeight:700,fontSize:16}}>Sign<span style={{color:"#c6941a"}}>Craft</span></span>
              </div>
            </div>
            <button onClick={handleCopy} style={{background:copied?"#10b981":"linear-gradient(135deg,#c6941a,#d4a843)",color:copied?"#fff":"#0a0e1a",border:"none",borderRadius:8,padding:"10px 24px",fontWeight:700,fontSize:13,cursor:"pointer",minWidth:160}}>
              {copied ? "\u2713 Copied to Clipboard!" : "\uD83D\uDCCB Copy Signature HTML"}
            </button>
          </div>
          <div className="editor-layout" style={{display:"flex",minHeight:"calc(100vh - 57px)"}}>
            <div className="editor-sidebar" style={{width:380,minWidth:380,borderRight:"1px solid rgba(255,255,255,0.06)",overflowY:"auto"}}>
              <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                {[{id:"details",l:"Details"},{id:"style",l:"Style"},{id:"social",l:"Social"}].map(t=>(
                  <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"14px 0",background:"none",border:"none",borderBottom:tab===t.id?"2px solid #c6941a":"2px solid transparent",color:tab===t.id?"#e2e8f0":"#64748b",fontSize:13,fontWeight:600,cursor:"pointer"}}>{t.l}</button>
                ))}
              </div>
              <div style={{padding:20}}>
                {tab==="details" && <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  {[["fullName","Full Name","John Smith"],["jobTitle","Job Title","Product Designer"],["company","Company","Acme Inc."],["email","Email","you@company.com"],["phone","Phone","+1 (555) 123-4567"],["website","Website","www.yoursite.com"],["address","Address (optional)","123 Main St, City"],["photoUrl","Photo URL (optional)","https://example.com/photo.jpg"]].map(([k,l,p])=>(
                    <div key={k}><label style={lS}>{l}</label><input style={iS} value={data[k]} onChange={e=>update(k,e.target.value)} placeholder={p} /></div>
                  ))}
                </div>}
                {tab==="style" && <div style={{display:"flex",flexDirection:"column",gap:20}}>
                  <div>
                    <label style={lS}>Template</label>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                      {TEMPLATES.map(t=><button key={t.id} onClick={()=>setTmpl(t.id)} style={{background:tmpl===t.id?"rgba(99,102,241,0.15)":"rgba(255,255,255,0.03)",border:tmpl===t.id?"2px solid #6366f1":"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:14,cursor:"pointer",textAlign:"left",color:"#e2e8f0"}}><div style={{fontWeight:600,fontSize:13}}>{t.name}</div><div style={{fontSize:11,color:"#64748b",marginTop:2}}>{t.desc}</div></button>)}
                    </div>
                  </div>
                  <div>
                    <label style={lS}>Color Scheme</label>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:8}}>
                      {COLORS.map(c2=><button key={c2.id} onClick={()=>setCs(c2.id)} style={{background:cs===c2.id?"rgba(255,255,255,0.08)":"transparent",border:cs===c2.id?"2px solid #6366f1":"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:10,cursor:"pointer",textAlign:"center"}}><div style={{display:"flex",justifyContent:"center",gap:4,marginBottom:6}}><div style={{width:16,height:16,borderRadius:4,background:c2.primary}} /><div style={{width:16,height:16,borderRadius:4,background:c2.accent}} /></div><div style={{fontSize:10,color:"#94a3b8"}}>{c2.label}</div></button>)}
                    </div>
                  </div>
                  <div>
                    <label style={lS}>Font</label>
                    <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>
                      {FONTS.map(fo=><button key={fo.id} onClick={()=>setFont(fo.id)} style={{background:font===fo.id?"rgba(99,102,241,0.15)":"rgba(255,255,255,0.03)",border:font===fo.id?"2px solid #6366f1":"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"10px 14px",cursor:"pointer",textAlign:"left",fontFamily:fo.family,color:"#e2e8f0",fontSize:14}}>{fo.label}</button>)}
                    </div>
                  </div>
                </div>}
                {tab==="social" && <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <p style={{fontSize:12,color:"#64748b",margin:"0 0 6px"}}>Add your social profiles. Enter username or full URL.</p>
                  {SOCIALS.map(p=><div key={p.id}><label style={lS}><span style={{marginRight:6}}>{p.icon}</span>{p.label}</label><input style={iS} value={data.socials[p.id]||""} onChange={e=>updateSocial(p.id,e.target.value)} placeholder={p.prefix+"yourname"} /></div>)}
                </div>}
              </div>
            </div>
            <div className="preview-panel" style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,background:"rgba(255,255,255,0.01)"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#64748b",textTransform:"uppercase",letterSpacing:1,marginBottom:20}}>Live Preview</div>
              <div style={{background:"#ffffff",borderRadius:16,padding:40,maxWidth:600,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
                <div style={{marginBottom:20,paddingBottom:16,borderBottom:"1px solid #e2e8f0"}}>
                  <div style={{fontSize:11,color:"#a0aec0",marginBottom:4}}>From: {data.email||"you@company.com"}</div>
                  <div style={{fontSize:11,color:"#a0aec0",marginBottom:8}}>To: client@example.com</div>
                  <div style={{fontSize:14,color:"#2d3748",fontWeight:600}}>Re: Project Update</div>
                </div>
                <div style={{fontSize:13,color:"#4a5568",lineHeight:1.7,marginBottom:24}}>Hi there,<br/><br/>Just following up on our conversation. Looking forward to hearing from you!<br/><br/>Best regards,</div>
                <div style={{borderTop:"1px solid #e2e8f0",paddingTop:16}} dangerouslySetInnerHTML={{__html:sigHTML}} />
              </div>
              <div style={{marginTop:32,display:"flex",gap:12}}>
                <button onClick={handleCopy} style={{background:copied?"#10b981":"linear-gradient(135deg,#c6941a,#d4a843)",color:copied?"#fff":"#0a0e1a",border:"none",borderRadius:10,padding:"14px 32px",fontWeight:700,fontSize:14,cursor:"pointer",boxShadow:"0 4px 20px rgba(198,148,26,0.3)"}}>
                  {copied ? "\u2713 Copied!" : "\uD83D\uDCCB Copy Signature"}
                </button>
              </div>
              <div style={{marginTop:20,background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:10,padding:"14px 20px",maxWidth:500}}>
                <div style={{fontSize:12,fontWeight:600,color:"#818cf8",marginBottom:4}}>How to use your signature</div>
                <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.6}}>
                  1. Click "Copy Signature" above<br/>
                  2. Open your email client (Gmail, Outlook, etc.)<br/>
                  3. Go to Settings {"\u2192"} Signature<br/>
                  4. Paste your new signature<br/>
                  5. That's it! Every email you send will look professional.
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("landing");
      if (page === "editor") return <Editor onBack={() => setPage("landing")} />;
      return <LandingPage onStart={() => setPage("editor")} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
